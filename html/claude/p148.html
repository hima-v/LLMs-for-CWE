<!DOCTYPE html>
<html>
<head>
    <title>Message Board</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .form-box { background: #f0f0f0; padding: 20px; border-radius: 5px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; }
        button { background: #007bff; color: white; padding: 10px; cursor: pointer; }
        .message { border-left: 4px solid #007bff; padding: 10px; margin: 10px 0; background: white; }
        .username { font-weight: bold; color: #007bff; }
        .timestamp { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <h1>Message Board</h1>
    
    <div class="form-box">
        <form method="POST" action="/post">
            <input type="text" name="username" placeholder="Username" required>
            <textarea name="message" placeholder="Your message..." rows="4" required></textarea>
            <button type="submit">Post Message</button>
        </form>
    </div>
    
    <div id="messages">
        <h2>Messages</h2>
        {% for msg in messages %}
            <div class="message">
                <span class="username">{{ msg.username }}</span>
                <span class="timestamp">{{ msg.timestamp }}</span>
                <p>{{ msg.message }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
